# Copie / référence — le blueprint utilisé par Render est à la racine : ../render.yaml
services:
  - type: web
    name: figsapp-cote-divoire-backend
    runtime: node
    region: frankfurt
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: ADMIN_COOKIE_NAME
        value: sa_admin
      - key: JSON_BODY_LIMIT
        value: 200kb
      - key: CORS_ORIGIN
        value: https://frontend-six-psi-82.vercel.app
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: shoolapp
      - key: DB_SSL
        value: true
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: true
      - key: DB_STARTUP_MAX_ATTEMPTS
        value: "30"
      - key: DB_STARTUP_DELAY_MS
        value: "2000"
